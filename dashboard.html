<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Stackly Medical Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= GLOBAL ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f7fb;
overflow-x:hidden;
}

/* ================= DASHBOARD ================= */
.dashboard{
display:flex;
min-height:100vh;
}

/* ================= SIDEBAR ================= */
.sidebar{
width:240px;
background:#150132;
color:white;
padding:25px;
transition:.4s;
position:relative;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:12px;
margin:10px 0;
cursor:pointer;
border-radius:6px;
}

.sidebar li:hover{
background:#6f2bae;
}

/* CLOSE BUTTON */
.close-btn{
display:none;
position:absolute;
top:15px;
right:18px;
font-size:22px;
cursor:pointer;
}

/* ================= MAIN ================= */
.main{
flex:1;
padding:25px;
}

/* ================= HAMBURGER ================= */
.hamburger{
display:none;
font-size:26px;
cursor:pointer;
margin-bottom:15px;
}

/* ================= BACK BUTTON ================= */
.back-btn{
background:#150132;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
margin-bottom:20px;
cursor:pointer;
}

/* ================= CARDS ================= */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
height:140px;
color:white;
padding:25px;
border-radius:12px;
position:relative;
display:flex;
flex-direction:column;
justify-content:center;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}

.card h3,
.card p{
position:relative;
z-index:2;
}

/* CARD BACKGROUNDS */
.total{
background:url("images/z (1).webp") center/cover;
}

.active-card{
background:url("images/z (2).webp") center/cover;
}

.offline-card{
background:url("images/z (3).webp") center/cover;
}

.patient{
background:url("images/v.webp") center/cover;
}

/* ================= CHARTS ================= */
.charts{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.chart-box{
background:white;
border-radius:12px;
padding:20px;
height:320px;
}

.chart-box canvas{
width:100%!important;
height:100%!important;
}

/* CARD BACKGROUNDS FIX */
.total,
.active-card,
.offline-card,
.patient{
background-position:center;
background-size:cover;
background-repeat:no-repeat;
}

/* ================= TABLE ================= */
.device-table{
margin-top:40px;
background:white;
padding:20px;
border-radius:12px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

.active{color:limegreen;}
.offline{color:red;}

/* ================= MOBILE ================= */
@media(max-width:768px){

.hamburger{
display:block;
}

.close-btn{
display:block;
}

/* MOBILE SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
height:100%;
z-index:999;
}

.sidebar.show{
left:0;
}

.dashboard{
flex-direction:column;
}

}

@media(max-width:768px){

.card{
height:180px;   /* increase height */
background-size:cover;
background-position:center;
}

}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>Stackly</h2>

<div class="close-btn" onclick="toggleMenu()">✖</div>

<ul>
<li>Dashboard</li>
<li>Devices</li>
<li>Monitoring</li>
<li>Reports</li>
<li onclick="go404()">Settings</li>
</ul>

</div>


<!-- MAIN -->
<div class="main">

<div class="hamburger" onclick="toggleMenu()">☰</div>

<h1>Stackly Medical Device Dashboard</h1>

<button class="back-btn" onclick="goHome()">⬅ Go Back</button>

<!-- CARDS -->
<div class="cards">

<div class="card total">
<h3>Total Devices</h3>
<p>128</p>
</div>

<div class="card active-card">
<h3>Active Devices</h3>
<p>112</p>
</div>

<div class="card offline-card">
<h3>Offline Devices</h3>
<p>16</p>
</div>

<div class="card patient">
<h3>Patients</h3>
<p>342</p>
</div>

</div>

<!-- CHARTS -->
<div class="charts">

<div class="chart-box">
<canvas id="lineChart"></canvas>
</div>

<div class="chart-box">
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<canvas id="pieChart"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="device-table">

<h2>Device Status</h2>

<table>
<tr>
<th>Device</th>
<th>Status</th>
<th>Location</th>
</tr>

<tr>
<td>Heart Monitor</td>
<td class="active">Active</td>
<td>ICU</td>
</tr>

<tr>
<td>Ventilator</td>
<td class="offline">Offline</td>
<td>Ward</td>
</tr>

</table>

</div>

</div>
</div>

<script>

/* SIDEBAR TOGGLE */
function toggleMenu(){
document.getElementById("sidebar")
.classList.toggle("show");
}

/* NAVIGATION */
function goHome(){
window.location.href="index.html";
}

function go404(){
window.location.href="404page.html";
}

/* CHART OPTIONS */
const options={
responsive:true,
maintainAspectRatio:false
};

/* LINE CHART */
new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri"],
datasets:[{
data:[12,19,10,22,18],
borderColor:"#150132",
tension:.4
}]
},
options
});

/* BAR CHART */
new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["ICU","Ward","Lab"],
datasets:[{
data:[30,20,15],
backgroundColor:"#6f2bae"
}]
},
options
});

/* PIE CHART */
new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:["Active","Offline"],
datasets:[{
data:[112,16],
backgroundColor:["green","red"]
}]
},
options
});

</script>

</body>
</html>
