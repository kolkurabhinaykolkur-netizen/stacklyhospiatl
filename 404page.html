<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#07112f;
color:white;
overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, rgba(23,162,184,.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,.08), transparent 45%);
animation:bgMove 10s linear infinite;
}

@keyframes bgMove{
0%{transform:translate(0,0);}
50%{transform:translate(-5%,-5%);}
100%{transform:translate(0,0);}
}

/* CONTAINER */
.error-container{
position:relative;
z-index:2;
text-align:center;
max-width:600px;
padding:20px;
}

/* BIG 404 */
.error-code{
font-size:130px;
font-weight:700;
color:#17a2b8;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* TEXT */
.error-container h2{
font-size:32px;
margin-bottom:15px;
}

.error-container p{
color:#cbd5e1;
margin-bottom:30px;
}

/* BUTTON */
.home-btn{
display:inline-block;
background:#17a2b8;
color:white;
padding:14px 28px;
border-radius:8px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.home-btn:hover{
background:#0f7f90;
transform:translateY(-3px);
}

/* MOBILE */
@media(max-width:600px){

.error-code{
font-size:90px;
}

.error-container h2{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="error-container">

<h1 class="error-code">404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you are looking for might have been removed,
renamed or temporarily unavailable.
</p>

<a href="home2.html" class="home-btn">
← Back To Home
</a>

</div>

</body>
</html>
